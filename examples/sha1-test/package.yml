id: sha1-test
version: 1.0.0
type: application
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-lang-core.git
#    type: local
#    path: ../../../am-lang-core
  - id: am-net
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-net.git
  - id: am-ssl
    type: local
    path: ../../
#    realm: github
#    type: git-repo
#    tag: latest
#    branch: master
#    url: https://github.com/anderskjeldsen/am-ssl.git
platforms:
  - id: libc
    abstract: true
  - id: linux-x64
    extends: libc
    gccCommand: gcc -O3
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: macos
    extends: libc
    gccCommand: gcc -O3
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: macos-arm
    extends: libc
    gccCommand: gcc -O3
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
    gccAdditionalLibraries:

buildTargets:
  - id: linux-x64
    platform: linux-x64
  - id: macos
    platform: macos
  - id: macos-arm
    platform: macos-arm
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
