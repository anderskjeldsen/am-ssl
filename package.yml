
id: am-ssl
version: 0.10.1
type: library
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-lang-core.git
    features: ["floatingPoint"]
  - id: am-net
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-net.git
  - id: am-tests
    testOnly: true
    realm: github
    type: git-repo
    tag: latest
    url: https://github.com/anderskjeldsen/am-tests.git

platforms:
  - id: libc
    abstract: true
    additionalHeaders:
    additionalCSources: 
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc
    additionalHeaders:
      - filename: am_ssl_amissl_init.h
    # `errno.o` is owned by am-lang-core now (every app gets one copy
    # via the universal core dep). The amissl_init bring-up still lives
    # here because its function name is am-ssl-prefixed and is only
    # called from this library's SslSocketStream.c. Filename + include-
    # guard are package-prefixed so they don't collide with am-crypto's
    # analogous header on the shared `-I additional/<pkg>/` search path.
    additionalCSources:
      - inputFilename: am_ssl_amissl_init.c
        outputFilename: am_ssl_amissl_init.o
    gccAdditionalOptions:
      - -noixemul     
    additionalLinkerFlags:
      - -noixemul
    additionalIncludePaths:
      - /opt/amiga/m68k-amigaos/AmiSSL/include
    gccLibraryPaths:
      - /opt/amiga/m68k-amigaos/AmiSSL/lib/AmigaOS3
    gccAdditionalLibraries:
#      - socket
      - amisslstubs
      - amisslauto
  - id: linux-x64
    extends: libc
    gccCommand: gcc
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: macos
    extends: libc
    gccCommand: gcc -O3
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalOptions:
#      - -DOPENSSL_SSL_LIBRARY=/opt/homebrew/opt/openssl/lib/libssl.dylib -DOPENSSL_CRYPTO_LIBRARY=/opt/homebrew/opt/openssl@3/lib/libcrypto.3.dylib
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: macos-arm
    extends: libc
    gccCommand: gcc
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalOptions:
#      - -DOPENSSL_SSL_LIBRARY=c-libs/openssl/lib/libssl.dylib -DOPENSSL_CRYPTO_LIBRARY=c-libs/openssl/lib/libcrypto.3.dylib
    gccAdditionalLibraries:
      - ssl
      - crypto
  - id: morphos-ppc
    extends: libc
    gccCommand: ppc-morphos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
    gccAdditionalLibraries:
      - ssl_shared
      - crypto_shared
      - atomic
  - id: aros-x86-64
    extends: libc
    gccCommand: gcc
    gccAdditionalOptions:
      - -noixemul
buildTargets:
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
  - id: macos
    platform: macos
    commands:
      - make -f macos.makefile
  - id: macos-arm
    platform: macos-arm
    commands:
      - make -f macos-arm.makefile
  - id: linux-x64
    platform: linux-x64
  - id: morphos-ppc_docker
    platform: morphos-ppc
    commands:
      - docker run --rm -v "${build_dir}":/work -e USER=$( id -u ) -e GROUP=$( id -g ) -it amigadev/crosstools:ppc-morphos make -f morphos_ppc.makefile -C /work all
  - id: morphos-ppc_docker_win
    platform: morphos-ppc
    commands:
      - docker run --rm -v "${build_dir}":/work -e -i amigadev/crosstools:ppc-morphos make -f morphos-ppc.makefile -C /work all
  - id: aros-x86-64_docker_win
    platform: aros-x86-64
    commands: 
      - docker run --rm -v "${build_dir}":/work -i amigadev/crosstools:x86_64-aros make aros-x86-64.makefile all
